name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mcp-switch-${{ matrix.target }}.tar.gz mcp-switch
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/mcp-switch.exe -DestinationPath mcp-switch-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: mcp-switch-${{ matrix.target }}
          path: mcp-switch-${{ matrix.target }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          cd release && sha256sum * > checksums.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Compute checksums
        id: sums
        run: |
          cd artifacts
          echo "darwin_amd64=$(sha256sum mcp-switch-x86_64-apple-darwin/mcp-switch-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin_arm64=$(sha256sum mcp-switch-aarch64-apple-darwin/mcp-switch-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(sha256sum mcp-switch-x86_64-unknown-linux-gnu/mcp-switch-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum mcp-switch-aarch64-unknown-linux-gnu/mcp-switch-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          cat > mcp-switch.rb << EOF
          # typed: false
          # frozen_string_literal: true

          class McpSwitch < Formula
            desc "CLI tool to toggle MCP servers for Claude Code"
            homepage "https://github.com/incu6us/mcp-switch"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/incu6us/mcp-switch/releases/download/${TAG}/mcp-switch-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sums.outputs.darwin_amd64 }}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/incu6us/mcp-switch/releases/download/${TAG}/mcp-switch-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sums.outputs.darwin_arm64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/incu6us/mcp-switch/releases/download/${TAG}/mcp-switch-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sums.outputs.linux_amd64 }}"
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/incu6us/mcp-switch/releases/download/${TAG}/mcp-switch-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sums.outputs.linux_arm64 }}"
              end
            end

            def install
              bin.install "mcp-switch"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mcp-switch --version")
            end
          end
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' mcp-switch.rb

      - name: Push formula to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/incu6us/homebrew-tap.git tap
          cp mcp-switch.rb tap/Formula/mcp-switch.rb
          cd tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/mcp-switch.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "mcp-switch ${GITHUB_REF_NAME}"
          git push
